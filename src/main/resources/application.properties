# ============================================================
# APPLICATION PDI-BURKINA — CONFIGURATION PRINCIPALE
# ============================================================

spring.application.name=pdi-backend
server.port=8080

# ============================================================
# BASE DE DONNÉES POSTGRESQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pdi_db
spring.datasource.username=pdi_user
spring.datasource.password=Root@2024Secure
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# SÉCURITÉ JWT
# ============================================================
# Clé secrète Base64 (min 256 bits) — À CHANGER EN PRODUCTION
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBhbmQgc2VjdXJlIHNlY3JldCBrZXkgZm9yIFBESSBCdXJraW5hIEZhc28gMjAyNg==
# Durée de vie du token : 60 minutes
app.jwt.expiration-ms=3600000

# ============================================================
# RATE LIMITING (Bucket4j)
# ============================================================
# Tentatives max de connexion par minute par IP
app.security.max-login-attempts=10

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# CORS — Autoriser le frontend React (port 5173)
# ============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176

# ============================================================
# LOGS
# ============================================================
logging.level.bf.gov.conasur.pdi=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/pdi-application.log
logging.level.org.springframework.security=TRACE
